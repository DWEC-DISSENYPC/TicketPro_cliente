<app-hero
  titulo="MI CUENTA"
  subtitulo="Accede para gestionar tus entradas y compras"
  imagenFondo="png/hero-principal.png"
  [altura]="'30vh'">
</app-hero>

<div class="login-wrapper">
  <div class="login-container">
    <h2>Iniciar Sesión</h2>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input
          type="text"
          id="username"
          name="username"
          [(ngModel)]="credentials.username"
          placeholder="Tu nombre de usuario"
          required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>

        <div class="password-input-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            name="password"
            [(ngModel)]="credentials.password"
            placeholder="••••••••"
            required>

          <button
            type="button"
            class="toggle-password"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'">
            {{ showPassword ? '👁️‍🗨️' : '👁️' }}
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="!loginForm.form.valid">
        Entrar
      </button>

      <div *ngIf="errorMessage" class="error-msg">
        {{ errorMessage }}
      </div>

      <div class="login-footer">
        <p>¿Olvidaste tu contraseña? <a href="forgot-password">Recupérala aquí</a></p>
      </div>
    </form>
  </div>
</div>

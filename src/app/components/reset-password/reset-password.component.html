<app-hero titulo="RESTABLECER CONTRASEÑA" subtitulo="Crea una nueva clave de acceso segura"
  imagenFondo="png/hero-principal.png" [altura]="'40vh'">
</app-hero>

<!-- ###### PANTALLA CENTRADA DE RECUPERACION VALIDADA ###### -->
<!-- ------ Contenedor Limitador General ------ -->
<div class="auth-container">
  
  <!-- ###### CAJA DE FORMULARIO BLANCA ###### -->
  <div class="auth-box">
    <!-- ###### ZONAS DE ALERTA O RENDERIZADO ###### -->

    <!-- ------ Muestra Unico Div Cuando Proceso Exitoso Y Desaparece Todo Lo Demas ------ -->
    @if (mensajeSuccess) {
      <div class="alert alert-success">
        {{ mensajeSuccess }}
      </div>
    } @else {
      
      <!-- ------ Subtitulo Y Formulario Inicial Normal ------ -->
      <p class="subtitle">Introduce tu nueva clave de acceso.</p>

      <!-- ------ Retorna Posibles Fallos Enviados Por Rest O Expiracion Local Front ------ -->
      @if (errorMessage) {
        <div class="alert alert-danger">{{ errorMessage }}</div>
      }

      <!-- ###### VERIFICACION TOKEN ACTIVO ###### -->
      <!-- ------ Solamente Construye Input Si Hay Interrogacion Parametrica En Url ------ -->
      @if (token) {
        <form (ngSubmit)="actualizarPassword()" #resetForm="ngForm">
          
          <div class="form-group">
            <label for="pass">Nueva Contraseña</label>
            <input
              type="password"
              name="newPassword"
              [(ngModel)]="newPassword"
              class="form-control"
              required
              minlength="6"
              placeholder="Mínimo 6 caracteres">
          </div>

          <div class="form-group">
            <label for="confirm">Confirmar Contraseña</label>
            <input
              type="password"
              name="confirmPassword"
              [(ngModel)]="confirmPassword"
              class="form-control"
              required
              placeholder="Repite la contraseña">
          </div>

          <!-- ###### BOTON SUBMIT DE UPDATE ###### -->
          <button type="submit" [disabled]="!resetForm.valid || loading" class="btn-primary">
            {{ loading ? 'Actualizando...' : 'Cambiar contraseña' }}
          </button>
        </form>
      }
    }
  </div>
</div>

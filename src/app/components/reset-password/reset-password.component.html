<div class="auth-container">
  <div class="auth-box">
    <h2>Nueva Contraseña</h2>

    @if (mensajeSuccess) {
      <div class="alert alert-success">
        {{ mensajeSuccess }}
      </div>
    } @else {
      <p class="subtitle">Introduce tu nueva clave de acceso.</p>

      @if (errorMessage) {
        <div class="alert alert-danger">{{ errorMessage }}</div>
      }

      @if (token) {
        <form (ngSubmit)="actualizarPassword()" #resetForm="ngForm">
          <div class="form-group">
            <label for="pass">Nueva Contraseña</label>
            <input
              type="password"
              name="newPassword"
              [(ngModel)]="newPassword"
              class="form-control"
              required
              minlength="6"
              placeholder="Mínimo 6 caracteres">
          </div>

          <div class="form-group">
            <label for="confirm">Confirmar Contraseña</label>
            <input
              type="password"
              name="confirmPassword"
              [(ngModel)]="confirmPassword"
              class="form-control"
              required
              placeholder="Repite la contraseña">
          </div>

          <button type="submit" [disabled]="!resetForm.valid || loading" class="btn-primary">
            {{ loading ? 'Actualizando...' : 'Cambiar contraseña' }}
          </button>
        </form>
      }
    }
  </div>
</div>

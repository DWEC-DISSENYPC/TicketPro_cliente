<div class="auth-container">
  <div class="auth-box">
    <h2>Recuperar Contraseña</h2>
    <p class="subtitle">Introduce tu email y te enviaremos un enlace para restablecer tu clave.</p>

    <form (ngSubmit)="enviarEnlace()" #forgotForm="ngForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          required
          email
          placeholder="ejemplo@correo.com"
          class="form-control"
        >
      </div>

      <div *ngIf="mensajeSuccess" class="alert alert-success">
        {{ mensajeSuccess }}
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="!forgotForm.valid || loading" class="btn-primary">
  @if (loading) {
    <span>Enviando...</span>
  } @else {
    <span>Enviar enlace de recuperación</span>
  }
</button>
    </form>

    <div class="auth-footer">
      <a routerLink="/login">Volver al inicio de sesión</a>
    </div>
  </div>
</div>

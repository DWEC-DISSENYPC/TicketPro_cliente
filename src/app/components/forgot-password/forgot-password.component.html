<app-hero titulo="RECUPERAR CONTRASEÑA" subtitulo="Te ayudamos a recuperar el acceso a tu cuenta"
  imagenFondo="png/hero-principal.png" [altura]="'40vh'">
</app-hero>

<!-- ###### PANTALLA CENTRADA DE AUTENTICACION ###### -->
<!-- ------ Contiene El Div Limitador Para Ponerlo En El Medio ------ -->
<div class="auth-container">

  <!-- ###### CAJA DE CREDENCIALES ###### -->
  <!-- ------ El Recuadro Blanco Tipico De Identificacion ------ -->
  <div class="auth-box">


    <!-- ###### FORMULARIO NG TEMPLATE ###### -->
    <!-- ------ Accion Dirigida A Carga Y Activacion De Validadores ------ -->
    <form (ngSubmit)="enviarEnlace()" #forgotForm="ngForm">
      
      <!-- ------ Caja Para Entrar El Email ------ -->
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          required
          email
          placeholder="ejemplo@correo.com"
          class="form-control"
        >
      </div>

      <!-- ###### ALERTAS INTERNAS DE CAJA ###### -->
      <!-- ------ Texto Si Recibe Respuesta Http 200 ------ -->
      <div *ngIf="mensajeSuccess" class="alert alert-success">
        {{ mensajeSuccess }}
      </div>

      <!-- ------ Texto Si Falla La Peticion ------ -->
      <div *ngIf="errorMessage" class="alert alert-danger">
        {{ errorMessage }}
      </div>

      <!-- ###### BOTON DE PROCEDER ###### -->
      <!-- ------ Condicionado Funcional Y Visual Al Switch De Carga ------ -->
      <button type="submit" [disabled]="!forgotForm.valid || loading" class="btn-primary">
        @if (loading) {
          <span>Enviando...</span>
        } @else {
          <span>Enviar enlace de recuperación</span>
        }
      </button>
    </form>

    <!-- ###### ENLACES SECUNDARIOS ###### -->
    <!-- ------ Vuelve Al Modulo De Sesion Por Defecto ------ -->
    <div class="auth-footer">
      <a routerLink="/login">Volver al inicio de sesión</a>
    </div>
    
  </div>
</div>

<!-- ###### CONTENEDOR HERO PUBLICO ###### -->
<!-- ------ Componente Que Modifica Su Altura Y Su Banner Constantemente ------ -->
<section class="hero"
  [style.backgroundImage]="'url(' + imagenFondo + ')'"
  [style.height]="altura"
  role="banner"
  aria-labelledby="hero-title">
  
  <!-- ------ Filtro Capa Media Para Brillo De Letra ------ -->
  <div class="hero-overlay">
    
    <!-- ###### Caja De Textos Presentacional ###### -->
    <div class="hero-content">
      
      <!-- ------ Datos Dinamicos Insertados ------ -->
      <h1 class="hero-title" id="hero-title">{{ titulo }}</h1>
      <p class="hero-subtitle">{{ subtitulo }}</p>

      <!-- ###### BOTONES DIRECTOS ###### -->
      <!-- ------ Comandos Visuales Inertes Momentaneos ------ -->
      <div class="hero-actions">
        <button class="btn-glass" (click)="abrirBuscador()" aria-label="Abrir buscador de eventos">BUSCAR EVENTOS</button>
        <button class="btn-outline" (click)="explorarCartelera()" aria-label="Explorar la cartelera de eventos disponibles">EXPLORAR CARTELERA</button>
      </div>
    </div>
  </div>

  <!-- ###### POPUP DE BUSQUEDA PREMIUM ###### -->
  <div class="search-overlay" *ngIf="mostrarBuscador" (click)="cerrarBuscador()">
    <div class="search-modal" (click)="$event.stopPropagation()">
      <div class="search-header">
        <h2>¿Qué estás buscando?</h2>
        <button class="btn-close" (click)="cerrarBuscador()" aria-label="Cerrar buscador">&times;</button>
      </div>
      <div class="search-body">
        <div class="search-input-wrapper">
          <i class="bi bi-search search-icon"></i>
          <input 
            type="text" 
            [(ngModel)]="terminoBusqueda" 
            (keyup.enter)="ejecutarBusqueda()"
            placeholder="Busca por nombre o ciudad..." 
            autofocus
          />
        </div>
        <button class="btn-search-submit" (click)="ejecutarBusqueda()">BUSCAR</button>
      </div>
    </div>
  </div>
</section>
